<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — Redirigiendo…</title>
<meta http-equiv="refresh" content="0; url=config-master.html">
<style>
  body{
    font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100vh;margin:0;padding:20px;
    background:#fafafa;color:#333;text-align:center;
  }
  .spinner{
    width:40px;height:40px;
    border:4px solid #e0e0e0;border-top-color:#107C10;
    border-radius:50%;animation:spin 0.8s linear infinite;
    margin-bottom:20px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  h2{margin:0 0 8px;font-size:18px}
  p{margin:4px 0;font-size:14px;color:#555}
  .hint{
    margin-top:20px;font-size:13px;color:#888;
    max-width:420px;
  }
  a{color:#0078D4;text-decoration:none;font-weight:600}
  a:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Redirigiendo al Config Master…</h2>
  <p>La gestión de usuarios ahora vive en el Config Master.</p>
  <p class="hint">
    Por favor actualiza tu bookmark a:<br>
    <a href="config-master.html">config-master.html</a>
  </p>
  <script>
    setTimeout(function(){
      window.location.replace('config-master.html');
    }, 100);
  </script>
</body>
</html>
