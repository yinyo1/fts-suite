<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FTS Suite · Finanzas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/finanzas.css?v=0.1.0">
<link rel="stylesheet" href="css/instrumentos-pago.css?v=0.5.4">
</head>
<body>

<!-- ═══ LOGIN GATE ═══ -->
<div id="login" class="login-screen">
  <div class="login-card">
    <div class="brand-mark">
      <div class="logo">F</div>
      <div class="brand-text">FTS Suite<small>Finanzas</small></div>
    </div>
    <h2 style="font-family:'IBM Plex Sans Condensed';font-size:22px;font-weight:600;margin-bottom:6px;">Acceso al área financiera</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:24px;">Vigilancia · Rentabilidad · Estados financieros · Centro de transacciones · Acciones.</p>
    <form id="loginForm" autocomplete="off">
      <div class="form-row">
        <label>Usuario</label>
        <input type="text" id="loginUser" value="finanzas" autocomplete="username" />
      </div>
      <div class="form-row">
        <label>Contraseña</label>
        <input type="password" id="loginPass" autocomplete="current-password" autofocus />
      </div>
      <button class="btn" id="loginBtn" type="submit" style="width:100%;padding:11px;margin-top:8px;">Iniciar sesión</button>
    </form>
    <div id="loginError" class="login-error hidden"></div>
  </div>
</div>

<!-- ═══ APP SHELL ═══ -->
<div id="app" class="app-shell hidden">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">F</div>
      <div class="brand-text">FTS Suite<small>Finanzas</small></div>
    </div>
    <nav id="sidebarNav"><!-- generado desde manifest.json --></nav>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="breadcrumb"><span class="block" id="bcBlock"></span>FTS Suite · <b id="bcCurrent">Dashboard</b></div>
      <div class="topbar-actions">
        <span class="mono" style="font-size:12px;color:var(--muted);" id="topbarDate"></span>
      </div>
    </div>
    <div id="viewContainer"></div>
  </main>
</div>

<script src="js/auth-fin.js?v=0.1.0"></script>
<script src="js/fin-client.js?v=0.1.0"></script>
<!-- Paso 3: componentes + módulos (auto-registran en FinRouter al cargar) -->
<script src="js/state.js?v=0.3.0"></script>
<script src="js/router.js?v=0.3.0"></script>
<script src="js/company-selector.js?v=0.3.0"></script>
<script src="js/modules/facturas-core.js?v=0.3.0"></script>
<script src="js/modules/facturas-odoo.js?v=0.3.0"></script>
<script src="js/modules/bills-odoo.js?v=0.3.0"></script>
<script src="js/modules/instrumentos-pago.js?v=0.5.4"></script>
<script>
/* ═══ FTS Finanzas — shell (Paso 1: auth + sidebar + empty states) ═══ */
'use strict';

var MANIFEST = null;
var STATE = { route: 'dashboard' };

// ─── arranque ───
document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('loginForm').addEventListener('submit', onLogin);
  if (window.FinAuth && window.FinAuth.isValid()) {
    bootApp();
  } else {
    showLogin();
  }
});

function showLogin() {
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
  var p = document.getElementById('loginPass'); if (p) { p.value = ''; p.focus(); }
}
window.showLogin = showLogin;   // FinRouter lo invoca al detectar sesión expirada

async function onLogin(e) {
  e.preventDefault();
  var user = document.getElementById('loginUser').value.trim();
  var pass = document.getElementById('loginPass').value;
  var btn  = document.getElementById('loginBtn');
  var err  = document.getElementById('loginError');
  err.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Verificando…';

  var r = await window.FinAuth.login(user, pass);

  btn.disabled = false; btn.textContent = 'Iniciar sesión';
  if (!r.ok) {
    var msg = r.msg || 'No se pudo iniciar sesión.';
    if (r.code === 'LOCKED' && r.retry_after_s) {
      msg = 'Demasiados intentos. Espera ~' + Math.ceil(r.retry_after_s / 60) + ' min e intenta de nuevo.';
    }
    err.textContent = msg;
    err.classList.remove('hidden');
    return;
  }
  bootApp();
}

async function bootApp() {
  // Re-chequeo defensivo de expiración
  if (!window.FinAuth.isValid()) { window.FinAuth.logout(); showLogin(); return; }

  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  var d = new Date();
  document.getElementById('topbarDate').textContent =
    d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });

  if (!MANIFEST) {
    try {
      var res = await fetch('manifest.json?v=0.4.0', { cache: 'no-store' });
      MANIFEST = await res.json();
    } catch (e) { MANIFEST = { modules: [], blocks: {} }; }
  }
  renderUser();
  window.FinRouter.init(MANIFEST);   // sidebar + ruta inicial (extraído a router.js en Paso 3)
}

// ─── sidebar dinámico + moduleMode: extraídos a js/router.js (FinRouter) + js/state.js en Paso 3 ───

function renderUser() {
  var s = window.FinAuth.getSession() || {};
  var exp = s.expires_at ? new Date(s.expires_at).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }) : '—';
  document.getElementById('sidebarUser').innerHTML =
    '<div class="name">' + esc(s.user || 'finanzas') + '</div>' +
    '<div class="role">Sesión válida hasta ' + exp + '</div>' +
    '<div class="logout" onclick="doLogout()">Cerrar sesión →</div>';
}

function doLogout() {
  window.FinAuth.logout();
  showLogin();
}

// ─── navegación: vive ahora en js/router.js → FinRouter.navigate (empty-state incluido) ───

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}
</script>
</body>
</html>
