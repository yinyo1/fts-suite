<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FTS Diagnóstico</title>
<style>
  body{font-family:monospace;padding:16px;background:#1a1a1a;color:#0f0;font-size:13px;line-height:1.5}
  h2{color:#0f0;margin-top:0}
  .item{margin-bottom:6px;padding:8px 10px;background:#222;border-radius:4px;word-wrap:break-word;overflow-wrap:break-word}
  .ok{color:#0f0}
  .err{color:#f55}
  .warn{color:#ff0}
  .section{color:#4cdb4c;font-weight:bold;margin-top:12px;border-top:1px solid #333;padding-top:10px}
  button{background:#107C10;color:#fff;border:none;padding:14px 28px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:16px;font-family:inherit;font-weight:bold}
  button:hover{background:#0d6b0d}
  button:active{transform:scale(0.97)}
</style>
</head>
<body>
<h2>🔧 FTS Diagnóstico</h2>
<div id="output"></div>
<button onclick="runDiag()">▶ Ejecutar diagnóstico</button>

<script>
// ═══ Interceptor de fetch para diagnóstico ═══
window._ftsLogs = [];
var _originalFetch = window.fetch;
window.fetch = async function(){
  var url = arguments[0];
  var start = Date.now();
  try{
    var res = await _originalFetch.apply(this, arguments);
    var clone = res.clone();
    var body = await clone.text();
    window._ftsLogs.push({
      ts: new Date().toLocaleTimeString('es-MX'),
      url: url,
      ms: Date.now() - start,
      status: res.status,
      ok: res.ok,
      response: body.substring(0, 500)
    });
    if(window._ftsLogs.length > 10) window._ftsLogs.shift();
    return res;
  } catch(e){
    window._ftsLogs.push({
      ts: new Date().toLocaleTimeString('es-MX'),
      url: url,
      ms: Date.now() - start,
      status: 'ERROR',
      ok: false,
      response: e.message
    });
    if(window._ftsLogs.length > 10) window._ftsLogs.shift();
    throw e;
  }
};

// ═══ Capturar errores globales ═══
window._ftsErrors = [];
window.onerror = function(msg, src, line){
  window._ftsErrors.push({
    ts: new Date().toLocaleTimeString('es-MX'),
    msg: msg,
    src: src,
    line: line
  });
};

async function runDiag(){
  const out = document.getElementById('output');
  out.innerHTML = '';

  function log(msg, type){
    const cls = type || 'ok';
    out.innerHTML += '<div class="item ' + cls + '">' + msg + '</div>';
  }
  function section(title){
    out.innerHTML += '<div class="item section">=== ' + title + ' ===</div>';
  }

  // 1) Config localStorage detallada
  section('CONFIG LOCAL STORAGE');

  // GitHub Token
  const ghToken = localStorage.getItem('ops_github_token');
  if(ghToken){
    log('✅ GitHub Token: configurado (…' + ghToken.slice(-4) + ')');
  } else {
    log('❌ GitHub Token: NO configurado — auto-sync de geo NO funcionará', 'err');
  }

  // n8n URL
  const n8nUrlLocal = localStorage.getItem('ops_n8n_url');
  if(n8nUrlLocal){
    log('✅ n8n URL: ' + n8nUrlLocal);
  } else {
    log('❌ n8n URL: (vacío)', 'err');
  }

  // Odoo URL
  const odooUrl = localStorage.getItem('ops_odoo_url');
  log(odooUrl ? '✅ Odoo URL: ' + odooUrl : '⚠️ Odoo URL: (vacío)', odooUrl ? 'ok' : 'warn');

  // Demo mode
  const demoVal = localStorage.getItem('ops_demo_mode');
  log('ℹ️ Demo mode: ' + (demoVal === '0' ? 'DESACTIVADO (real)' : demoVal === '1' ? 'ACTIVO' : 'sin configurar (default demo)'), demoVal === '0' ? 'ok' : 'warn');

  // Sync password
  const syncPw = localStorage.getItem('ops_sync_password');
  log(syncPw ? '✅ Sync password: configurada (…' + syncPw.slice(-4) + ')' : '⚠️ Sync password: no configurada (secrets cifrados no se cargarán auto)', syncPw ? 'ok' : 'warn');

  // Geolocations
  section('GEOLOCATIONS');
  let geos = [];
  try{ geos = JSON.parse(localStorage.getItem('ops_kiosk_geolocations') || '[]'); } catch(e){}
  if(geos.length > 0){
    log('✅ ' + geos.length + ' sitio(s) configurado(s):');
    geos.forEach(function(g, i){
      const lat = g.lat != null ? parseFloat(g.lat).toFixed(5) : '?';
      const lng = g.lng != null ? parseFloat(g.lng).toFixed(5) : '?';
      log('   📍 ' + (g.nombre || 'Sin nombre') + ' — ' + lat + ', ' + lng + ' — radio: ' + (g.radio || '?') + 'm');
    });
  } else {
    log('❌ Sin geolocations configuradas — geo check deshabilitado', 'err');
  }

  // 2) Public config desde GitHub
  section('PUBLIC CONFIG');
  try{
    const r = await fetch(
      'https://raw.githubusercontent.com/yinyo1/fts-suite/main/shared/public-config.json?t=' + Date.now(),
      { cache:'no-store' }
    );
    if(!r.ok){
      log('❌ HTTP ' + r.status, 'err');
    } else {
      const d = await r.json();
      log('✅ public-config.json cargado');
      log('n8n_url: ' + (d.n8n_url || '(vacío)'));
      log('odoo_url: ' + (d.odoo_url || '(vacío)'));
      log('demo_mode: ' + d.demo_mode);
      log('updated: ' + (d.updated || '?'));
    }
  } catch(e){
    log('❌ Error: ' + e.message, 'err');
  }

  // 3) Ping n8n (con retry)
  section('N8N PING');
  const n8nUrl = localStorage.getItem('ops_n8n_url') || 'https://primary-production-5c3c.up.railway.app';
  log('URL usada: ' + n8nUrl);
  let n8nOk = false;
  for(let attempt = 1; attempt <= 3; attempt++){
    log('Intento ' + attempt + '/3…');
    try{
      const controller = new AbortController();
      const t = setTimeout(function(){ controller.abort(); }, 10000);
      const r = await fetch(
        n8nUrl + '/webhook/kiosk/empleados',
        { method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({ test:true }),
          signal: controller.signal
        }
      );
      clearTimeout(t);
      log('HTTP status: ' + r.status);
      const text = await r.text();
      let d;
      try{ d = JSON.parse(text); } catch(e){ d = null; }
      if(d && d.empleados){
        log('✅ n8n respondió: ' + d.empleados.length + ' empleados');
        const primer = d.empleados[0];
        log('Primer empleado: ' + ((primer && (primer.name || primer.nombre)) || '?'));
      } else if(d){
        log('⚠️ n8n respondió pero sin empleados: ' + JSON.stringify(d).substring(0,200), 'warn');
      } else {
        log('⚠️ Respuesta no-JSON: ' + text.substring(0,200), 'warn');
      }
      n8nOk = true;
      break;
    } catch(e){
      log('❌ Intento ' + attempt + ' falló: ' + e.message, 'err');
      if(attempt < 3){
        log('⏳ Esperando 3s antes de reintentar…', 'warn');
        await new Promise(function(r){ setTimeout(r, 3000); });
      }
    }
  }
  if(!n8nOk){
    log('❌ n8n no responde tras 3 intentos (Railway puede estar durmiendo — intenta de nuevo en 30s)', 'err');
  }

  // 4) Kiosk demo mode check
  section('KIOSK MODE');
  const demo = localStorage.getItem('ops_demo_mode');
  if(demo === '0'){
    log('✅ Modo demo DESACTIVADO (n8n real)');
  } else if(demo === '1'){
    log('⚠️ Modo demo ACTIVO (valor: 1)', 'warn');
  } else {
    log('⚠️ ops_demo_mode no configurado (valor: ' + demo + ') — default es DEMO', 'warn');
  }

  // 5) Sesión FTSAuth
  section('SESIÓN FTSAUTH');
  try{
    const sess = localStorage.getItem('fts_session');
    if(sess){
      const s = JSON.parse(sess);
      log('✅ Sesión activa: ' + (s.username || '?'));
      log('Role: ' + (s.role || '?'));
      log('Modulos: ' + (typeof s.modulos === 'string' ? s.modulos : 'objeto granular'));
    } else {
      log('⚠️ Sin sesión activa', 'warn');
    }
  } catch(e){
    log('❌ Error leyendo sesión: ' + e.message, 'err');
  }

  // 6) Fetch logs
  section('ÚLTIMOS FETCH LOGS (' + window._ftsLogs.length + ')');
  if(window._ftsLogs.length === 0){
    log('Sin llamadas fetch registradas aún', 'warn');
  } else {
    window._ftsLogs.slice().reverse().forEach(function(l){
      var statusColor = l.ok ? 'ok' : 'err';
      var urlShort = (typeof l.url === 'string') ? l.url.replace('https://','').substring(0, 60) : String(l.url).substring(0, 60);
      log('[' + l.ts + '] ' + l.status + ' ' + l.ms + 'ms — ' + urlShort, statusColor);
      if(!l.ok || l.status === 'ERROR'){
        log('   ↳ ' + (l.response || '').substring(0, 200), 'err');
      }
    });
  }

  // 7) Errores JS
  section('ERRORES JS (' + window._ftsErrors.length + ')');
  if(window._ftsErrors.length === 0){
    log('✅ Sin errores JS capturados');
  } else {
    window._ftsErrors.forEach(function(e){
      log('[' + e.ts + '] ' + e.msg, 'err');
      if(e.src) log('   ↳ ' + e.src + ':' + e.line, 'err');
    });
  }
}

function decodificarGeo(){
  var input = document.getElementById('codigoGeoInput').value.trim();
  var out = document.getElementById('geoAnalisis');
  if(!input){ out.innerHTML = '<p style="color:#ff0">Pega un código primero</p>'; return; }
  try{
    var decoded = JSON.parse(decodeURIComponent(escape(atob(input))));
    var sitios = decoded.sitios_configurados || [];
    var lat = decoded.coords_empleado && decoded.coords_empleado.lat;
    var lng = decoded.coords_empleado && decoded.coords_empleado.lng;
    var html = '<div style="background:#222;border-radius:10px;padding:12px;margin-top:8px">';
    html += '<p><strong>👷 Empleado:</strong> ' + (decoded.empleado || '?') + '</p>';
    html += '<p><strong>🕐 Timestamp:</strong> ' + new Date(decoded.ts).toLocaleString('es-MX') + '</p>';
    html += '<p><strong>📍 Coords técnico:</strong> ' + lat + ', ' + lng + ' (±' + (decoded.coords_empleado && decoded.coords_empleado.accuracy || '?') + 'm)</p>';
    html += '<p><strong>🏭 Sitio más cercano:</strong> ' + (decoded.sitio_mas_cercano || '?') + '</p>';
    html += '<p><strong>📏 Distancia:</strong> ' + (decoded.distancia_metros || '?') + 'm</p>';
    html += '<p><strong>🔄 Última sync geo:</strong> ' + (decoded.geo_sync_timestamp === 'nunca' ? '<span style="color:#f55">❌ NUNCA</span>' : new Date(decoded.geo_sync_timestamp).toLocaleString('es-MX')) + '</p>';
    html += '<p><strong>📋 Sitios configurados (' + sitios.length + '):</strong></p>';
    sitios.forEach(function(s){
      var dist = '?';
      if(lat != null && lng != null && s.lat != null && s.lng != null){
        var R = 6371000;
        var dLat = (s.lat - lat) * Math.PI / 180;
        var dLng = (s.lng - lng) * Math.PI / 180;
        var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat*Math.PI/180)*Math.cos(s.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
        dist = Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
      }
      var dentro = (typeof dist === 'number') && dist <= s.radio;
      html += '<div style="padding:6px 8px;margin:4px 0;border-radius:6px;background:' + (dentro ? '#1b3a1b' : '#3a1b1b') + '">' +
        (dentro ? '✅' : '❌') + ' <strong>' + (s.nombre || '?') + '</strong> — Radio: ' + s.radio + 'm | Distancia: ' + dist + 'm | ' + s.lat + ', ' + s.lng +
      '</div>';
    });
    html += '</div>';
    out.innerHTML = html;
  } catch(e){
    out.innerHTML = '<p style="color:#f55">❌ Código inválido: ' + e.message + '</p>';
  }
}
</script>

<div style="margin-top:24px;border-top:2px solid #333;padding-top:16px">
  <h2 style="color:#0f0;font-size:16px;margin-bottom:12px">🔍 Decodificar código geo</h2>
  <textarea id="codigoGeoInput" placeholder="Pega aquí el código que te compartió el técnico..." style="width:100%;height:80px;padding:8px;border-radius:8px;border:1px solid #444;background:#222;color:#0f0;font-size:13px;box-sizing:border-box;resize:none;font-family:monospace"></textarea>
  <button onclick="decodificarGeo()" style="margin-top:8px;width:100%;padding:10px;background:#0078D4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;font-weight:bold">🔍 Analizar</button>
  <div id="geoAnalisis" style="margin-top:12px;font-size:13px;color:#0f0"></div>
</div>

</body>
</html>
