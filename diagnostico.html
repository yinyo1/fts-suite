<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FTS Diagnóstico</title>
<style>
  body{font-family:monospace;padding:16px;background:#1a1a1a;color:#0f0;font-size:13px;line-height:1.5}
  h2{color:#0f0;margin-top:0}
  .item{margin-bottom:6px;padding:8px 10px;background:#222;border-radius:4px;word-wrap:break-word;overflow-wrap:break-word}
  .ok{color:#0f0}
  .err{color:#f55}
  .warn{color:#ff0}
  .section{color:#4cdb4c;font-weight:bold;margin-top:12px;border-top:1px solid #333;padding-top:10px}
  button{background:#107C10;color:#fff;border:none;padding:14px 28px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:16px;font-family:inherit;font-weight:bold}
  button:hover{background:#0d6b0d}
  button:active{transform:scale(0.97)}
</style>
</head>
<body>
<h2>🔧 FTS Diagnóstico</h2>
<button id="btnCopy" onclick="copyDiag()">📋 Copiar diagnóstico</button>
<div id="output"></div>
<button onclick="runDiag()">▶ Ejecutar diagnóstico</button>

<script>
// ═══ Interceptor de fetch para diagnóstico ═══
window._ftsLogs = [];
var _originalFetch = window.fetch;
window.fetch = async function(){
  var url = arguments[0];
  var start = Date.now();
  try{
    var res = await _originalFetch.apply(this, arguments);
    var clone = res.clone();
    var body = await clone.text();
    window._ftsLogs.push({
      ts: new Date().toLocaleTimeString('es-MX'),
      url: url,
      ms: Date.now() - start,
      status: res.status,
      ok: res.ok,
      response: body.substring(0, 500)
    });
    if(window._ftsLogs.length > 10) window._ftsLogs.shift();
    return res;
  } catch(e){
    window._ftsLogs.push({
      ts: new Date().toLocaleTimeString('es-MX'),
      url: url,
      ms: Date.now() - start,
      status: 'ERROR',
      ok: false,
      response: e.message
    });
    if(window._ftsLogs.length > 10) window._ftsLogs.shift();
    throw e;
  }
};

// ═══ Capturar errores globales ═══
window._ftsErrors = [];
window.onerror = function(msg, src, line){
  window._ftsErrors.push({
    ts: new Date().toLocaleTimeString('es-MX'),
    msg: msg,
    src: src,
    line: line
  });
};

async function runDiag(){
  const out = document.getElementById('output');
  out.innerHTML = '';

  function log(msg, type){
    const cls = type || 'ok';
    out.innerHTML += '<div class="item ' + cls + '">' + msg + '</div>';
  }
  function section(title){
    out.innerHTML += '<div class="item section">=== ' + title + ' ===</div>';
  }

  // 1) Config localStorage detallada
  section('CONFIG LOCAL STORAGE');

  // GitHub Token
  const ghToken = localStorage.getItem('ops_github_token');
  if(ghToken){
    log('✅ GitHub Token: configurado (…' + ghToken.slice(-4) + ')');
  } else {
    log('❌ GitHub Token: NO configurado — auto-sync de geo NO funcionará', 'err');
  }

  // n8n URL
  const n8nUrlLocal = localStorage.getItem('ops_n8n_url');
  if(n8nUrlLocal){
    log('✅ n8n URL: ' + n8nUrlLocal);
  } else {
    log('❌ n8n URL: (vacío)', 'err');
  }

  // Odoo URL
  const odooUrl = localStorage.getItem('ops_odoo_url');
  log(odooUrl ? '✅ Odoo URL: ' + odooUrl : '⚠️ Odoo URL: (vacío)', odooUrl ? 'ok' : 'warn');

  // Demo mode
  const demoVal = localStorage.getItem('ops_demo_mode');
  log('ℹ️ Demo mode: ' + (demoVal === '0' ? 'DESACTIVADO (real)' : demoVal === '1' ? 'ACTIVO' : 'sin configurar (default demo)'), demoVal === '0' ? 'ok' : 'warn');

  // Sync password
  const syncPw = localStorage.getItem('ops_sync_password');
  log(syncPw ? '✅ Sync password: configurada (…' + syncPw.slice(-4) + ')' : '⚠️ Sync password: no configurada (secrets cifrados no se cargarán auto)', syncPw ? 'ok' : 'warn');

  // Keys adicionales (sin prefijo ops_, timestamps, API keys estandarizadas)
  const extraKeys = [
    ['n8n_url',                 'URL n8n (sin prefijo ops_)'],
    ['odoo_url',                'URL Odoo (sin prefijo ops_)'],
    ['ops_geo_sync_timestamp',  'Último sync geo'],
    ['key_claude',              'Claude API Key'],
    ['key_groq',                'Groq API Key']
  ];
  for(const [k, label] of extraKeys){
    const v = localStorage.getItem(k);
    if(v){
      const display = v.length > 50 ? '…' + v.slice(-4) : v;
      log('✅ ' + label + ' (' + k + '): ' + display);
    } else {
      log('ℹ️ ' + label + ' (' + k + '): no configurada');
    }
  }

  // Geolocations
  section('GEOLOCATIONS');
  let geos = [];
  try{ geos = JSON.parse(localStorage.getItem('ops_kiosk_geolocations') || '[]'); } catch(e){}
  if(geos.length > 0){
    log('✅ ' + geos.length + ' sitio(s) configurado(s):');
    geos.forEach(function(g, i){
      const lat = g.lat != null ? parseFloat(g.lat).toFixed(5) : '?';
      const lng = g.lng != null ? parseFloat(g.lng).toFixed(5) : '?';
      log('   📍 ' + (g.nombre || 'Sin nombre') + ' — ' + lat + ', ' + lng + ' — radio: ' + (g.radio || '?') + 'm');
    });
  } else {
    log('❌ Sin geolocations configuradas — geo check deshabilitado', 'err');
  }

  // 2) Public config desde GitHub
  section('PUBLIC CONFIG');
  try{
    const r = await fetch(
      'https://raw.githubusercontent.com/yinyo1/fts-suite/main/shared/public-config.json?t=' + Date.now(),
      { cache:'no-store' }
    );
    if(!r.ok){
      log('❌ HTTP ' + r.status, 'err');
    } else {
      const d = await r.json();
      log('✅ public-config.json cargado');
      log('n8n_url: ' + (d.n8n_url || '(vacío)'));
      log('odoo_url: ' + (d.odoo_url || '(vacío)'));
      log('demo_mode: ' + d.demo_mode);
      log('updated: ' + (d.updated || '?'));
    }
  } catch(e){
    log('❌ Error: ' + e.message, 'err');
  }

  // 3) Ping n8n (con retry)
  section('N8N PING');
  const n8nUrl = localStorage.getItem('ops_n8n_url') || 'https://primary-production-5c3c.up.railway.app';
  log('URL usada: ' + n8nUrl);
  let n8nOk = false;
  for(let attempt = 1; attempt <= 3; attempt++){
    log('Intento ' + attempt + '/3…');
    try{
      const controller = new AbortController();
      const t = setTimeout(function(){ controller.abort(); }, 10000);
      const r = await fetch(
        n8nUrl + '/webhook/kiosk/empleados',
        { method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({ test:true }),
          signal: controller.signal
        }
      );
      clearTimeout(t);
      log('HTTP status: ' + r.status);
      const text = await r.text();
      let d;
      try{ d = JSON.parse(text); } catch(e){ d = null; }
      if(d && d.empleados){
        log('✅ n8n respondió: ' + d.empleados.length + ' empleados');
        const primer = d.empleados[0];
        log('Primer empleado: ' + ((primer && (primer.name || primer.nombre)) || '?'));
      } else if(d){
        log('⚠️ n8n respondió pero sin empleados: ' + JSON.stringify(d).substring(0,200), 'warn');
      } else {
        log('⚠️ Respuesta no-JSON: ' + text.substring(0,200), 'warn');
      }
      n8nOk = true;
      break;
    } catch(e){
      log('❌ Intento ' + attempt + ' falló: ' + e.message, 'err');
      if(attempt < 3){
        log('⏳ Esperando 3s antes de reintentar…', 'warn');
        await new Promise(function(r){ setTimeout(r, 3000); });
      }
    }
  }
  if(!n8nOk){
    log('❌ n8n no responde tras 3 intentos (Railway puede estar durmiendo — intenta de nuevo en 30s)', 'err');
  }

  // 4) Kiosk demo mode check
  section('KIOSK MODE');
  const demo = localStorage.getItem('ops_demo_mode');
  if(demo === '0'){
    log('✅ Modo demo DESACTIVADO (n8n real)');
  } else if(demo === '1'){
    log('⚠️ Modo demo ACTIVO (valor: 1)', 'warn');
  } else {
    log('⚠️ ops_demo_mode no configurado (valor: ' + demo + ') — default es DEMO', 'warn');
  }

  // 5) Sesión FTSAuth
  section('SESIÓN FTSAUTH');
  // Preferir FTSAuth.getSession() (valida timeout de inactividad); fallback a parse directo
  let sessionDataDiag = null;
  if(typeof FTSAuth !== 'undefined' && FTSAuth.getSession){
    sessionDataDiag = FTSAuth.getSession();
  } else {
    try { sessionDataDiag = JSON.parse(localStorage.getItem('fts_session') || 'null'); } catch(e){}
  }
  try{
    if(sessionDataDiag){
      log('✅ Sesión activa: ' + (sessionDataDiag.username || '?'));
      log('Role: ' + (sessionDataDiag.role || '?'));
      log('Modulos: ' + (typeof sessionDataDiag.modulos === 'string' ? sessionDataDiag.modulos : 'objeto granular'));
      log('Fuente: ' + (typeof FTSAuth !== 'undefined' && FTSAuth.getSession ? 'FTSAuth.getSession()' : 'localStorage directo'));
    } else {
      log('⚠️ Sin sesión activa', 'warn');
    }
  } catch(e){
    log('❌ Error leyendo sesión: ' + e.message, 'err');
  }

  // Sección 9 — Odoo (info estático, sin fetch directo porque Odoo bloquea CORS del browser)
  section('ODOO');
  const odooUrlTest = localStorage.getItem('ops_odoo_url') || localStorage.getItem('odoo_url') || '';
  const odooApi     = localStorage.getItem('ops_api_key')  || localStorage.getItem('key_odoo_api') || '';
  if(!odooUrlTest){
    log('❌ ops_odoo_url no configurada', 'err');
  } else {
    log('✅ Odoo URL configurada: ' + odooUrlTest);
    log('ℹ️ Test directo bloqueado por CORS (normal) — Odoo solo testeable desde n8n');
    if(odooApi) log('✅ API Key configurada: …' + odooApi.slice(-4));
    else        log('⚠️ ops_api_key no configurada', 'warn');
  }

  // Sección 10 — GitHub token validación real
  section('GITHUB TOKEN');
  const ghTokenDiag = localStorage.getItem('ops_github_token') || localStorage.getItem('key_github_token') || '';
  if(!ghTokenDiag){
    log('❌ GitHub token no configurado', 'err');
  } else {
    log('🔄 Validando token GitHub …' + ghTokenDiag.slice(-4));
    try {
      const ghRes = await fetch('https://api.github.com/repos/yinyo1/fts-suite', {
        headers: {
          'Authorization': 'token ' + ghTokenDiag,
          'Accept':        'application/vnd.github.v3+json'
        },
        signal: (typeof AbortSignal !== 'undefined' && AbortSignal.timeout) ? AbortSignal.timeout(8000) : undefined
      });
      if(ghRes.ok){
        const ghData = await ghRes.json();
        log('✅ Token válido — repo: ' + ghData.full_name);
        log('✅ Rama default: ' + ghData.default_branch);
        log('✅ Último push: ' + new Date(ghData.pushed_at).toLocaleString('es-MX'));
      } else if(ghRes.status === 401){
        log('❌ Token inválido o expirado (401)', 'err');
      } else if(ghRes.status === 403){
        log('⚠️ Token sin permisos suficientes (403)', 'warn');
      } else {
        log('❌ GitHub API HTTP ' + ghRes.status, 'err');
      }
    } catch(e){
      log('❌ GitHub API error: ' + e.message, 'err');
    }
  }

  // Sección 11 — API Keys IA
  section('API KEYS IA');
  const aiKeys = [
    { label:'Claude (Anthropic)', keys:['key_claude','ANTHROPIC_API_KEY','fts_api_key'], prefix:'sk-ant' },
    { label:'Groq',                keys:['key_groq'],                                     prefix:'gsk_'   },
    { label:'OpenRouter',          keys:['key_openrouter'],                               prefix:'sk-or-' },
    { label:'Gemini',              keys:['key_gemini'],                                   prefix:'AIza'   }
  ];
  for(const ai of aiKeys){
    let found = null, foundKey = null;
    for(const k of ai.keys){
      const v = localStorage.getItem(k);
      if(v && v.length > 8){ found = v; foundKey = k; break; }
    }
    if(found){
      const looksValid = found.startsWith(ai.prefix) || found.length > 20;
      log((looksValid ? '✅ ' : '⚠️ ') + ai.label + ': …' + found.slice(-4) + ' (key: ' + foundKey + ')',
          looksValid ? 'ok' : 'warn');
    } else {
      log('⚠️ ' + ai.label + ': no configurada', 'warn');
    }
  }

  // Sección 12 — N8N Workflows completo
  section('N8N WORKFLOWS');
  const n8nBase = localStorage.getItem('ops_n8n_url') || localStorage.getItem('n8n_url') || 'https://primary-production-5c3c.up.railway.app';
  const workflows = [
    { name:'kiosk/empleados', path:'/webhook/kiosk/empleados', body:{},
      validate: d => Array.isArray(d.empleados) && d.empleados.length > 0
        ? (d.empleados.length + ' empleados, 1ro: ' + (d.empleados[0] && (d.empleados[0].name || d.empleados[0].nombre) || '?'))
        : null },
    { name:'kiosk/sos', path:'/webhook/kiosk/sos', body:{},
      validate: d => Array.isArray(d.sos) ? (d.sos.length + ' proyectos') : null },
    { name:'dashboard/resumen', path:'/webhook/dashboard/resumen', body:{},
      validate: d => d.metricas !== undefined
        ? ('activos:' + d.metricas.activos + ' completados:' + d.metricas.completados)
        : null },
    { name:'kiosk/estado-empleado', path:'/webhook/kiosk/estado-empleado', body:{empleado_id:32},
      validate: d => d.estado_actual
        ? ('estado:' + d.estado_actual + ' historial:' + ((d.historial && d.historial.length) || 0))
        : null },
    { name:'kiosk/checkin', path:'/webhook/kiosk/checkin',
      body:{empleado_id:99999, tipo:'entrada', timestamp:new Date().toISOString(), lat:25.68, lng:-100.29, geo_autorizada:true},
      validate: d => {
        if(d.error && d.error.data && d.error.data.name && d.error.data.name.includes('MissingError')) return 'conecta Odoo ✓ (ID test inválido esperado)';
        if(d.accion_valida !== undefined) return 'workflow OK accion_valida:' + d.accion_valida;
        if(d.error_msg) return 'candado: ' + d.error_msg.substring(0, 40);
        return 'responde';
      }},
    { name:'kiosk/cerrar-registro', path:'/webhook/kiosk/cerrar-registro',
      body:{empleado_id:32, attendance_id:99999, checkout_estimado:new Date().toISOString(), motivo:'test diagnostico'},
      validate: d => {
        if(d.content && (d.content.sha || d.content.name)) return 'llega a GitHub ✓';
        if(d.commit) return 'PUT GitHub OK';
        return 'responde (error Odoo esperado con ID test)';
      }},
    { name:'kiosk/aprobar-ajuste', path:'/webhook/kiosk/aprobar-ajuste',
      body:{accion:'aprobar', attendance_id:99999, check_out_aprobado:'2026-04-18 03:00:00', supervisor_nombre:'Test'},
      validate: d => {
        if(d.error && d.error.data && d.error.data.name && (d.error.data.name.includes('AccessError') || d.error.data.name.includes('MissingError')))
          return 'conecta Odoo ✓ (ID test inválido esperado)';
        return 'responde';
      }},
    { name:'kiosk/crear-entrada-estimada', path:'/webhook/kiosk/crear-entrada-estimada',
      body:{empleado_id:99999, nombre:'Test Diag', hora_estimada:new Date().toISOString().substring(0,19), motivo:'test'},
      validate: d => {
        if(d.error && d.error.data && d.error.data.name && d.error.data.name.includes('MissingError')) return 'conecta Odoo ✓ (ID test inválido esperado)';
        if(d.status === 'ok') return 'OK attendance:' + d.attendance_id;
        return 'responde';
      }},
    { name:'incidencias/push', path:'/webhook/incidencias/push',
      body:{ incidencia:{ id:'DIAG-TEST-' + Date.now(), tipo:'test_diagnostico', username:'diagnostico' }},
      validate: d => {
        if(d.ok === true)  return 'OK id:' + d.id;
        if(d.ok === false) return null;
        return 'responde';
      }},
    { name:'kiosk/resolve-location', path:'/webhook/kiosk/resolve-location', body:{},
      validate: d => d !== undefined ? 'responde' : null }
  ];
  const wfResults = await Promise.allSettled(
    workflows.map(async function(wf){
      try {
        const r = await fetch(n8nBase + wf.path, {
          method: 'POST',
          headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify(wf.body),
          signal:  (typeof AbortSignal !== 'undefined' && AbortSignal.timeout) ? AbortSignal.timeout(12000) : undefined
        });
        const d = await r.json().catch(function(){ return {}; });
        const detail = wf.validate(d, r.status);
        return { name: wf.name, ok: detail !== null, detail: detail || JSON.stringify(d).substring(0, 60) };
      } catch(e){
        return { name: wf.name, ok: false, detail: e.message };
      }
    })
  );
  for(const r of wfResults){
    const v = r.value || { name:'?', ok:false, detail: r.reason && r.reason.message };
    log((v.ok ? '✅ ' : '❌ ') + v.name + ' → ' + v.detail, v.ok ? 'ok' : 'err');
  }
  const wfOk   = wfResults.filter(function(r){ return r.value && r.value.ok; }).length;
  const wfFail = wfResults.filter(function(r){ return !(r.value && r.value.ok); }).length;
  log('Workflows: ' + wfOk + '/' + workflows.length + ' OK' + (wfFail > 0 ? ' · ' + wfFail + ' FALLIDOS' : ''),
      wfFail === 0 ? 'ok' : 'warn');

  // Sección 13 — Geo sync status
  section('GEO SYNC STATUS');
  const lastGeoSync = localStorage.getItem('ops_geo_sync_timestamp');
  let geosLocalDiag = [];
  try { geosLocalDiag = JSON.parse(localStorage.getItem('ops_kiosk_geolocations') || '[]'); } catch(e){}
  if(!Array.isArray(geosLocalDiag)) geosLocalDiag = [];
  if(lastGeoSync){
    const syncDate = new Date(lastGeoSync);
    const diffHrs  = (Date.now() - syncDate.getTime()) / 3600000;
    const syncStr  = syncDate.toLocaleString('es-MX');
    if(diffHrs < 24)      log('✅ Último sync geo: ' + syncStr + ' (hace ' + (Math.round(diffHrs * 10) / 10) + ' hrs)');
    else if(diffHrs < 72) log('⚠️ Sync geo: ' + syncStr + ' (hace ' + Math.round(diffHrs) + ' hrs)', 'warn');
    else                  log('❌ Sync geo: ' + syncStr + ' (hace ' + Math.round(diffHrs / 24) + ' días — MUY desactualizado)', 'err');
  } else {
    log('⚠️ Sin registro de sync geo en este dispositivo', 'warn');
  }
  try {
    const pubRes = await fetch(
      'https://raw.githubusercontent.com/yinyo1/fts-suite/main/shared/public-config.json?t=' + Date.now(),
      { cache:'no-store', signal: (typeof AbortSignal !== 'undefined' && AbortSignal.timeout) ? AbortSignal.timeout(6000) : undefined }
    );
    if(pubRes.ok){
      const pub    = await pubRes.json();
      const geosGH = Array.isArray(pub.geolocations) ? pub.geolocations : [];
      if(geosLocalDiag.length === geosGH.length){
        const nL = geosLocalDiag.map(function(g){ return g.nombre; }).sort().join(',');
        const nG = geosGH.map(function(g){ return g.nombre; }).sort().join(',');
        if(nL === nG){
          log('✅ Geolocations sincronizadas: ' + geosGH.length + ' sitios local = GitHub');
        } else {
          log('⚠️ Mismo count (' + geosGH.length + ') pero nombres diferentes', 'warn');
          log('Local: ' + nL);
          log('GitHub: ' + nG);
        }
      } else {
        log('⚠️ Desincronizadas — Local: ' + geosLocalDiag.length + ' sitios · GitHub: ' + geosGH.length + ' sitios', 'warn');
        if(geosLocalDiag.length > geosGH.length){
          log('   → Hay sitios locales sin subir a GitHub', 'warn');
        } else {
          log('   → GitHub tiene sitios que no están en este dispositivo', 'warn');
        }
      }
      log('   GitHub updated: ' + (pub.updated || 'sin fecha'));
    }
  } catch(e){
    log('⚠️ No se pudo comparar con GitHub: ' + e.message, 'warn');
  }

  // Sección 14 — Páginas críticas
  section('PÁGINAS CRÍTICAS');
  const PAGES_BASE = 'https://yinyo1.github.io/fts-suite';
  const pages = [
    { name:'index.html (launcher)',            path:'/',                                     check: function(t){ return t.includes('FTS'); } },
    { name:'config-master.html',               path:'/shared/admin/config-master.html',      check: function(t){ return t.includes('Config Master'); } },
    { name:'operaciones/kiosk',                path:'/operaciones/kiosk/',                   check: function(t){ return t.includes('kiosk') || t.includes('Kiosk'); } },
    { name:'operaciones/config',               path:'/operaciones/config/',                  check: function(t){ return t.includes('Configuraci') || t.includes('config'); } },
    { name:'ingenieria/analisis-estructural',  path:'/ingenieria/analisis-estructural/',     check: function(t){ return t.includes('raw.js'); } },
    { name:'seguridad/iperc',                  path:'/seguridad/iperc/',                     check: function(t){ return t.includes('IPERC') || t.includes('iperc'); } },
    { name:'shared/admin/index.html',          path:'/shared/admin/',                        check: function(t){ return t.includes('Admin') || t.includes('admin'); } }
  ];
  const pageResults = await Promise.allSettled(
    pages.map(async function(pg){
      try {
        const r = await fetch(PAGES_BASE + pg.path + '?t=' + Date.now(), {
          cache:  'no-store',
          signal: (typeof AbortSignal !== 'undefined' && AbortSignal.timeout) ? AbortSignal.timeout(8000) : undefined
        });
        if(!r.ok) return { name: pg.name, ok:false, detail:'HTTP ' + r.status };
        const text = await r.text();
        const ok   = pg.check(text);
        return { name: pg.name, ok: !!ok, detail: ok ? 'OK' : 'contenido inesperado' };
      } catch(e){
        return { name: pg.name, ok:false, detail: e.message };
      }
    })
  );
  for(const r of pageResults){
    const v = r.value || { name:'?', ok:false, detail: r.reason && r.reason.message };
    log((v.ok ? '✅ ' : '❌ ') + v.name + ' → ' + v.detail, v.ok ? 'ok' : 'err');
  }
  // Extra: validar raw.js (txt/html + cache-busting) y auth-suite.js (auto-run + sin guards)
  try {
    const idxR    = await fetch(PAGES_BASE + '/ingenieria/analisis-estructural/?t=' + Date.now(), { cache:'no-store' });
    const idxText = await idxR.text();
    const rawMatch = idxText.match(/raw\.js\?v=([a-f0-9]+)/);
    const rawUrl   = rawMatch
      ? (PAGES_BASE + '/ingenieria/analisis-estructural/js/raw.js?v=' + rawMatch[1])
      : (PAGES_BASE + '/ingenieria/analisis-estructural/js/raw.js?t=' + Date.now());
    const rawR    = await fetch(rawUrl, { cache:'no-store' });
    const rawText = await rawR.text();
    const hasTxt  = rawText.includes("endsWith('.txt')");
    const hasHtml = rawText.includes("endsWith('.html')");
    log((hasTxt  ? '✅ ' : '❌ ') + 'raw.js soporte .txt',  hasTxt  ? 'ok' : 'err');
    log((hasHtml ? '✅ ' : '❌ ') + 'raw.js soporte .html', hasHtml ? 'ok' : 'err');
    if(rawMatch) log('✅ raw.js cache-busting: v=' + rawMatch[1]);
    else         log('⚠️ raw.js sin cache-busting', 'warn');
  } catch(e){
    log('⚠️ No se pudo verificar raw.js: ' + e.message, 'warn');
  }
  try {
    const authR    = await fetch(PAGES_BASE + '/shared/auth-suite.js?t=' + Date.now(), { cache:'no-store' });
    const authText = await authR.text();
    const hasAutoRun = authText.includes('autoLoadConfig().catch');
    const noGuard    = !authText.includes("!localStorage.getItem('ops_n8n_url')");
    log((hasAutoRun ? '✅ ' : '❌ ') + 'auth-suite.js auto-run en cada página', hasAutoRun ? 'ok' : 'err');
    log((noGuard    ? '✅ ' : '⚠️ ') + 'auth-suite.js sin guards (GitHub = fuente verdad)', noGuard ? 'ok' : 'warn');
  } catch(e){
    log('⚠️ No se pudo verificar auth-suite.js: ' + e.message, 'warn');
  }

  // 6) Fetch logs
  section('ÚLTIMOS FETCH LOGS (' + window._ftsLogs.length + ')');
  if(window._ftsLogs.length === 0){
    log('Sin llamadas fetch registradas aún', 'warn');
  } else {
    window._ftsLogs.slice().reverse().forEach(function(l){
      var statusColor = l.ok ? 'ok' : 'err';
      var urlShort = (typeof l.url === 'string') ? l.url.replace('https://','').substring(0, 60) : String(l.url).substring(0, 60);
      log('[' + l.ts + '] ' + l.status + ' ' + l.ms + 'ms — ' + urlShort, statusColor);
      if(!l.ok || l.status === 'ERROR'){
        log('   ↳ ' + (l.response || '').substring(0, 200), 'err');
      }
    });
  }

  // 7) Errores JS
  section('ERRORES JS (' + window._ftsErrors.length + ')');
  if(window._ftsErrors.length === 0){
    log('✅ Sin errores JS capturados');
  } else {
    window._ftsErrors.forEach(function(e){
      log('[' + e.ts + '] ' + e.msg, 'err');
      if(e.src) log('   ↳ ' + e.src + ':' + e.line, 'err');
    });
  }
}

async function copyDiag(){
  const btn = document.getElementById('btnCopy');
  const out = document.getElementById('output');
  const text = out ? (out.textContent || out.innerText || '') : '';
  if(!text.trim()){
    btn.textContent = '⚠️ Sin contenido';
    setTimeout(function(){ btn.textContent = '📋 Copiar diagnóstico'; }, 2000);
    return;
  }
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✅ Copiado';
  } catch(e){
    // Fallback para contextos sin clipboard API (HTTP, browsers viejos)
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '✅ Copiado';
    } catch(e2){
      btn.textContent = '❌ Error al copiar';
    }
  }
  setTimeout(function(){ btn.textContent = '📋 Copiar diagnóstico'; }, 2000);
}

function decodificarGeo(){
  var input = document.getElementById('codigoGeoInput').value.trim();
  var out = document.getElementById('geoAnalisis');
  if(!input){ out.innerHTML = '<p style="color:#ff0">Pega un código primero</p>'; return; }
  try{
    var decoded = JSON.parse(decodeURIComponent(escape(atob(input))));
    var sitios = decoded.sitios_configurados || [];
    var lat = decoded.coords_empleado && decoded.coords_empleado.lat;
    var lng = decoded.coords_empleado && decoded.coords_empleado.lng;
    var html = '<div style="background:#222;border-radius:10px;padding:12px;margin-top:8px">';
    html += '<p><strong>👷 Empleado:</strong> ' + (decoded.empleado || '?') + '</p>';
    html += '<p><strong>🕐 Timestamp:</strong> ' + new Date(decoded.ts).toLocaleString('es-MX') + '</p>';
    html += '<p><strong>📍 Coords técnico:</strong> ' + lat + ', ' + lng + ' (±' + (decoded.coords_empleado && decoded.coords_empleado.accuracy || '?') + 'm)</p>';
    html += '<p><strong>🏭 Sitio más cercano:</strong> ' + (decoded.sitio_mas_cercano || '?') + '</p>';
    html += '<p><strong>📏 Distancia:</strong> ' + (decoded.distancia_metros || '?') + 'm</p>';
    html += '<p><strong>🔄 Última sync geo:</strong> ' + (decoded.geo_sync_timestamp === 'nunca' ? '<span style="color:#f55">❌ NUNCA</span>' : new Date(decoded.geo_sync_timestamp).toLocaleString('es-MX')) + '</p>';
    html += '<p><strong>📋 Sitios configurados (' + sitios.length + '):</strong></p>';
    sitios.forEach(function(s){
      var dist = '?';
      if(lat != null && lng != null && s.lat != null && s.lng != null){
        var R = 6371000;
        var dLat = (s.lat - lat) * Math.PI / 180;
        var dLng = (s.lng - lng) * Math.PI / 180;
        var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat*Math.PI/180)*Math.cos(s.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
        dist = Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
      }
      var dentro = (typeof dist === 'number') && dist <= s.radio;
      html += '<div style="padding:6px 8px;margin:4px 0;border-radius:6px;background:' + (dentro ? '#1b3a1b' : '#3a1b1b') + '">' +
        (dentro ? '✅' : '❌') + ' <strong>' + (s.nombre || '?') + '</strong> — Radio: ' + s.radio + 'm | Distancia: ' + dist + 'm | ' + s.lat + ', ' + s.lng +
      '</div>';
    });
    html += '</div>';
    out.innerHTML = html;
  } catch(e){
    out.innerHTML = '<p style="color:#f55">❌ Código inválido: ' + e.message + '</p>';
  }
}
</script>

</div>
